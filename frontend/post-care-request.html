<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareConnect | Request Confirmed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary: #0a73ff;
  --primary-dark: #0056cc;
  --accent: #4ade80;
  --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0efff 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #1e293b;
  --text-muted: #64748b;
  --success: #22c55e;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 550px;
  animation: slideUp 0.8s ease-out;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.success-card {
  background: var(--card-bg);
  padding: 60px 40px;
  border-radius: 40px;
  text-align: center;
  box-shadow: 0 40px 80px rgba(10, 115, 255, 0.15);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  position: relative;
  overflow: hidden;
}

.success-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 8px;
  background: linear-gradient(to right, var(--primary), var(--accent));
}

.success-anim {
  width: 100px;
  height: 100px;
  background: #dcfce7;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 30px;
  color: var(--success);
  font-size: 45px;
  animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes scaleIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

h1 {
  font-size: 30px;
  font-weight: 800;
  color: var(--text-main);
  margin-bottom: 15px;
  letter-spacing: -1px;
}

.message {
  font-size: 16px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 35px;
}

.highlight-box {
  background: #f1f5f9;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.highlight-item {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-main);
}

.highlight-item i {
  color: var(--primary);
  width: 20px;
  text-align: center;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.btn {
  padding: 18px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 10px 20px rgba(10, 115, 255, 0.2);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 30px rgba(10, 115, 255, 0.3);
}

.btn-secondary {
  background: white;
  color: var(--text-main);
  border: 1.5px solid #e2e8f0;
}

.btn-secondary:hover {
  background: #f8fafc;
  border-color: var(--primary);
  color: var(--primary);
}

</style>
</head>

<body>

<div class="container">
  <div class="success-card">
    <div class="success-anim">
      <i class="fa-solid fa-check-circle"></i>
    </div>

    <h1>Request Confirmed!</h1>
    
    <div class="message">
      Your care request has been successfully transmitted. The nurse has been notified and will review your profile shortly.
    </div>

    <div class="highlight-box">
      <div class="highlight-item">
        <i class="fa-solid fa-clock"></i>
        <span>Est. Response Time: 10-15 Minutes</span>
      </div>
      <div class="highlight-item">
        <i class="fa-solid fa-robot"></i>
        <span>CareConnect AI is active for patient safety</span>
      </div>
    </div>

    <div class="actions">
      <a href="patient-dashboard.html" class="btn btn-primary">
        <i class="fa-solid fa-house"></i> Go to Dashboard
      </a>
      <a href="request-status.html" class="btn btn-secondary">
        <i class="fa-solid fa-list-check"></i> View All Requests
      </a>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  // Logic preserved for consistency, though primarily a confirmation page
});
</script>

</body>
</html>

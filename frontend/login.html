<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CareConnect | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary: #0a73ff;
  --primary-dark: #0056cc;
  --accent: #4ade80;
  --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0efff 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #1e293b;
  --text-muted: #64748b;
  --glass: rgba(255, 255, 255, 0.8);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* Background Shapes for Premium Look */
body::before, body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(80px);
  z-index: -1;
}

body::before {
  background: rgba(10, 115, 255, 0.15);
  top: -100px;
  left: -100px;
}

body::after {
  background: rgba(74, 222, 128, 0.1);
  bottom: -100px;
  right: -100px;
}

.login-container {
  width: 100%;
  max-width: 440px;
  padding: 20px;
  animation: slideUp 0.8s ease-out;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-card {
  background: var(--card-bg);
  padding: 45px 35px;
  border-radius: 30px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  text-align: center;
}

.logo-section {
  margin-bottom: 35px;
}

.logo-circle {
  width: 65px;
  height: 65px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
  box-shadow: 0 10px 20px rgba(10, 115, 255, 0.3);
  transform: rotate(-5deg);
  transition: transform 0.3s ease;
}

.logo-circle:hover {
  transform: rotate(0deg) scale(1.05);
}

.logo-circle i {
  color: white;
  font-size: 30px;
}

.logo-section h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: -0.5px;
}

.logo-section p {
  color: var(--text-muted);
  font-size: 15px;
  margin-top: 5px;
}

.form-group {
  margin-bottom: 20px;
  text-align: left;
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  background: #f8fafc;
  border: 2px solid transparent;
  border-radius: 16px;
  padding: 2px 18px;
  transition: all 0.3s ease;
}

.input-wrapper:focus-within {
  background: white;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(10, 115, 255, 0.1);
}

.input-wrapper i {
  color: var(--text-muted);
  font-size: 18px;
  margin-right: 12px;
}

.input-wrapper input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  padding: 14px 0;
  font-size: 15px;
  font-weight: 500;
  color: var(--text-main);
}

.input-wrapper input::placeholder {
  color: #94a3b8;
}

.role-selector {
  margin-top: 25px;
  margin-bottom: 30px;
}

.role-selector label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 12px;
  text-align: center;
}

.toggle-group {
  display: flex;
  background: #f1f5f9;
  padding: 5px;
  border-radius: 16px;
  position: relative;
}

.toggle-item {
  flex: 1;
  padding: 12px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 12px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
  position: relative;
}

.toggle-item.active {
  color: white;
  background: var(--primary);
  box-shadow: 0 4px 12px rgba(10, 115, 255, 0.3);
}

.login-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: 18px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 10px 20px rgba(10, 115, 255, 0.2);
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 25px rgba(10, 115, 255, 0.3);
}

.login-btn:active {
  transform: translateY(0);
}

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0 20px;
  color: #cbd5e1;
  font-size: 13px;
  font-weight: 500;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

/* ── Outlined switch button ── */
.switch-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: transparent;
  color: var(--primary);
  border: 2px solid var(--primary);
  border-radius: 18px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: all 0.3s ease;
  letter-spacing: 0.2px;
}

.switch-btn:hover {
  background: rgba(10, 115, 255, 0.06);
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(10, 115, 255, 0.12);
}

.footer-links {
  margin-top: 18px;
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
}

.footer-links a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

.footer-links a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-circle">
        <i class="fa-solid fa-heart-pulse"></i>
      </div>
      <h1>CareConnect</h1>
      <p>Compassionate care, always connected</p>
    </div>

    <div class="form-group">
      <div class="input-wrapper">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address">
      </div>
    </div>

    <div class="form-group">
      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
      </div>
    </div>

    <div class="role-selector">
      <label>Access as</label>
      <div class="toggle-group">
        <div id="family" class="toggle-item active">Family / Patient</div>
        <div id="nurse" class="toggle-item">Nurse / Caregiver</div>
      </div>
    </div>

    <button id="loginBtn" class="login-btn" type="button">Sign In</button>

    <!-- Switch to Signup -->
    <div class="divider">or</div>

    <a href="signup.html" class="switch-btn" id="goToSignup">
      <i class="fa-solid fa-user-plus" style="margin-right:8px;"></i>Create New Account
    </a>

    <div class="footer-links">
      New to CareConnect? <a href="signup.html">Sign up here</a>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { signInWithEmailAndPassword } from 
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

document.addEventListener("DOMContentLoaded", () => {
  let role = "family";

  const familyBtn = document.getElementById("family");
  const nurseBtn = document.getElementById("nurse");
  const loginBtn = document.getElementById("loginBtn");

  familyBtn.addEventListener("click", () => {
    role = "family";
    familyBtn.classList.add("active");
    nurseBtn.classList.remove("active");
  });

  nurseBtn.addEventListener("click", () => {
    role = "nurse";
    nurseBtn.classList.add("active");
    familyBtn.classList.remove("active");
  });

  loginBtn.addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
      alert("Please enter both email and password");
      return;
    }

    // Visual feedback for button
    loginBtn.innerText = "Signing in...";
    loginBtn.style.opacity = "0.8";
    loginBtn.disabled = true;

    signInWithEmailAndPassword(auth, email, password)
      .then(async (userCredential) => {
        const user = userCredential.user;
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        // Success alert removed for smoother UX, redirecting directly
        if (docSnap.exists() && docSnap.data().patientName) {
          window.location.href = "patient-dashboard.html";
        } else {
          window.location.href = "nurse-dashboard.html";
        }
      })
      .catch(err => {
        alert(err.message);
        loginBtn.innerText = "Sign In";
        loginBtn.style.opacity = "1";
        loginBtn.disabled = false;
      });
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CareConnect | Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary: #0a73ff;
  --primary-dark: #0056cc;
  --accent: #4ade80;
  --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0efff 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #1e293b;
  --text-muted: #64748b;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow-x: hidden;
  padding: 40px 20px;
}

/* Background Shapes */
body::before, body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(100px);
  z-index: -1;
}

body::before {
  background: rgba(10, 115, 255, 0.1);
  top: -150px;
  left: -150px;
}

body::after {
  background: rgba(74, 222, 128, 0.08);
  bottom: -150px;
  right: -150px;
}

.signup-container {
  width: 100%;
  max-width: 480px;
  animation: slideIn 0.8s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.signup-card {
  background: var(--card-bg);
  padding: 40px 35px;
  border-radius: 30px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.4);
}

.brand {
  text-align: center;
  margin-bottom: 30px;
}

.logo-icon {
  width: 55px;
  height: 55px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
  box-shadow: 0 8px 16px rgba(10, 115, 255, 0.2);
}

.logo-icon i {
  color: white;
  font-size: 24px;
}

.brand h2 {
  font-size: 26px;
  font-weight: 700;
  color: var(--text-main);
}

.brand p {
  color: var(--text-muted);
  font-size: 15px;
  margin-top: 6px;
}

.form-grid {
  display: grid;
  gap: 15px;
}

.input-wrapper {
  display: flex;
  align-items: center;
  background: #f8fafc;
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 2px 16px;
  transition: all 0.3s ease;
}

.input-wrapper:focus-within {
  background: white;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(10, 115, 255, 0.08);
}

.input-wrapper i {
  color: var(--text-muted);
  font-size: 16px;
  margin-right: 12px;
}

.input-wrapper input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  padding: 12px 0;
  font-size: 15px;
  font-weight: 500;
  color: var(--text-main);
}

.role-section {
  margin-top: 10px;
}

.role-section label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 10px;
  text-align: center;
}

.toggle-group {
  display: flex;
  background: #f1f5f9;
  padding: 4px;
  border-radius: 14px;
}

.toggle-item {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s ease;
}

.toggle-item.active {
  background: var(--primary);
  color: white;
  box-shadow: 0 4px 10px rgba(10, 115, 255, 0.2);
}

.signup-btn {
  width: 100%;
  margin-top: 25px;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 16px rgba(10, 115, 255, 0.15);
}

.signup-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 20px rgba(10, 115, 255, 0.25);
}

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 22px 0 18px;
  color: #cbd5e1;
  font-size: 13px;
  font-weight: 500;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

/* ── Outlined switch button ── */
.switch-btn {
  display: block;
  width: 100%;
  padding: 13px;
  background: transparent;
  color: var(--primary);
  border: 2px solid var(--primary);
  border-radius: 16px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: all 0.3s ease;
  letter-spacing: 0.2px;
}

.switch-btn:hover {
  background: rgba(10, 115, 255, 0.06);
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(10, 115, 255, 0.12);
}

.footer-text {
  text-align: center;
  margin-top: 18px;
  font-size: 14px;
  color: var(--text-muted);
}

.footer-text a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

.footer-text a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="signup-container">
  <div class="signup-card">
    <div class="brand">
      <div class="logo-icon">
        <i class="fa-solid fa-heart-pulse"></i>
      </div>
      <h2>Create Account</h2>
      <p>Join CareConnect for trusted home care</p>
    </div>

    <div class="form-grid">
      <div class="input-wrapper">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="fullName" placeholder="Full Name">
      </div>

      <div class="input-wrapper">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address">
      </div>

      <div class="input-wrapper">
        <i class="fa-solid fa-phone"></i>
        <input type="tel" id="phone" placeholder="Phone Number">
      </div>

      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Create Password">
      </div>
    </div>

    <div class="role-section">
      <label>I am registering as a</label>
      <div class="toggle-group">
        <div id="family" class="toggle-item active">Family / Patient</div>
        <div id="nurse" class="toggle-item">Nurse / Caregiver</div>
      </div>
    </div>

    <button id="signupBtn" class="signup-btn" type="button">Create Account</button>

    <!-- Switch to Login -->
    <div class="divider">or</div>

    <a href="login.html" class="switch-btn" id="goToLogin">
      <i class="fa-solid fa-arrow-right-to-bracket" style="margin-right:8px;"></i>Sign In to Existing Account
    </a>

    <div class="footer-text">
      Already registered? <a href="login.html">Log in here</a>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, setDoc } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

document.addEventListener("DOMContentLoaded", () => {
  let role = "family";

  const familyBtn = document.getElementById("family");
  const nurseBtn = document.getElementById("nurse");
  const signupBtn = document.getElementById("signupBtn");

  familyBtn.addEventListener("click", () => {
    role = "family";
    familyBtn.classList.add("active");
    nurseBtn.classList.remove("active");
  });

  nurseBtn.addEventListener("click", () => {
    role = "nurse";
    nurseBtn.classList.add("active");
    familyBtn.classList.remove("active");
  });

  signupBtn.addEventListener("click", async () => {
    const name = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;

    if (!name || !email || !phone || !password) {
      alert("Please fill in all fields");
      return;
    }

    if (password.length < 6) {
      alert("Password should be at least 6 characters");
      return;
    }

    signupBtn.innerText = "Creating account...";
    signupBtn.disabled = true;
    signupBtn.style.opacity = "0.7";

    try {
      const userCredential =
        await createUserWithEmailAndPassword(auth, email, password);

      const uid = userCredential.user.uid;

      await setDoc(doc(db, "users", uid), {
        name,
        email,
        phone,
        role,
        createdAt: new Date()
      });

      if (role === "family") {
        window.location.href = "patient-details.html";
      } else {
        window.location.href = "nurse-infostore.html";
      }

    } catch (error) {
      alert(error.message);
      signupBtn.innerText = "Create Account";
      signupBtn.disabled = false;
      signupBtn.style.opacity = "1";
    }
  });
});
</script>

</body>
</html>

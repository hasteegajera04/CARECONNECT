<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareConnect | Patient Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary: #0a73ff;
  --primary-dark: #0056cc;
  --accent: #4ade80;
  --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0efff 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #1e293b;
  --text-muted: #64748b;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}

.header-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.5);
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon i { color: white; font-size: 18px; }
.logo span { font-weight: 700; font-size: 20px; color: var(--text-main); }

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}

.settings-card {
  background: var(--card-bg);
  width: 100%;
  max-width: 950px;
  padding: 50px;
  border-radius: 35px;
  box-shadow: 0 30px 60px rgba(10, 115, 255, 0.1);
  backdrop-filter: blur(10px);
  margin-top: 60px;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  text-align: center;
  margin-bottom: 45px;
}

.card-header h1 {
  font-size: 34px;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: -1.5px;
}

.card-header p {
  color: var(--text-muted);
  font-size: 16px;
  margin-top: 5px;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
}

.section-label {
  grid-column: 1 / -1;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  margin-top: 25px;
  padding-bottom: 12px;
  border-bottom: 2px solid #f1f5f9;
  display: flex;
  align-items: center;
  gap: 10px;
}

.input-field label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.input-wrapper {
  background: white;
  padding: 14px 20px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1.5px solid #f1f5f9;
  transition: 0.3s;
}

.input-wrapper:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(10, 115, 255, 0.1);
}

.input-wrapper i {
  color: var(--primary);
  font-size: 16px;
  width: 20px;
  text-align: center;
}

.input-wrapper input, .input-wrapper select, .input-wrapper textarea {
  border: none;
  outline: none;
  width: 100%;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-main);
  background: transparent;
}

.input-wrapper textarea {
  min-height: 90px;
  resize: none;
}

.status-text {
  font-size: 12px;
  color: #f97316;
  font-weight: 600;
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.save-btn {
  grid-column: 1 / -1;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  padding: 18px;
  border-radius: 20px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 40px;
  transition: 0.3s;
  box-shadow: 0 10px 20px rgba(10, 115, 255, 0.2);
}

.save-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 30px rgba(10, 115, 255, 0.3);
}

</style>
</head>

<body>

<div class="header-nav">
  <div class="logo" onclick="location.href='patient-dashboard.html'">
    <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    <span>CareConnect</span>
  </div>
  <a href="patient-dashboard.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Dashboard
  </a>
</div>

<div class="settings-card">
  <div class="card-header">
    <h1>Patient Settings</h1>
    <p>Keep your profile updated for better healthcare delivery</p>
  </div>

  <div class="form-grid">
    <div class="section-label"><i class="fa-solid fa-user-gear"></i> Basic Profile</div>

    <div class="input-field">
      <label>Patient Full Name</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="patientName" placeholder="Full Name">
      </div>
    </div>

    <div class="input-field">
      <label>Age</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-cake-candles"></i>
        <input type="number" id="age" placeholder="Age">
      </div>
    </div>

    <div class="input-field">
      <label>Gender</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-venus-mars"></i>
        <select id="gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="input-field">
      <label>Blood Group</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-droplet"></i>
        <select id="bloodGroup">
          <option value="A+">A+</option><option value="A-">A-</option>
          <option value="B+">B+</option><option value="B-">B-</option>
          <option value="AB+">AB+</option><option value="AB-">AB-</option>
          <option value="O+">O+</option><option value="O-">O-</option>
        </select>
      </div>
    </div>

    <div class="section-label"><i class="fa-solid fa-clipboard-list"></i> Medical Details</div>

    <div class="input-field">
      <label>Existing Conditions</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-heart-pulse"></i>
        <input type="text" id="diseases" placeholder="e.g. Diabetes, Hypertension">
      </div>
    </div>

    <div class="input-field">
      <label>Allergies</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <input type="text" id="allergies" placeholder="e.g. Penicillin, Peanuts">
      </div>
    </div>

    <div class="input-field" style="grid-column: 1 / -1;">
      <label>Medical History</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-notes-medical"></i>
        <textarea id="history" placeholder="Summary of past illnesses or surgeries..."></textarea>
      </div>
    </div>

    <div class="input-field" style="grid-column: 1 / -1;">
      <label>Current Medications</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-pills"></i>
        <textarea id="medications" placeholder="List medications and dosages..."></textarea>
      </div>
    </div>

    <div class="section-label"><i class="fa-solid fa-user-shield"></i> Guardian Information</div>

    <div class="input-field">
      <label>Guardian Name</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-user-nurse"></i>
        <input type="text" id="guardianName" placeholder="Full Name">
      </div>
    </div>

    <div class="input-field">
      <label>Relationship</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-people-arrows"></i>
        <select id="guardianRelation">
          <option value="Son">Son</option>
          <option value="Daughter">Daughter</option>
          <option value="Spouse">Spouse</option>
          <option value="Parent">Parent</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="input-field">
      <label>Mobile Number</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-phone"></i>
        <input type="tel" id="guardianPhone" placeholder="+91 XXXXX XXXXX">
      </div>
    </div>

    <div class="input-field">
      <label>Email Address</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="guardianEmail" placeholder="guardian@example.com">
      </div>
    </div>

    <div class="section-label"><i class="fa-solid fa-id-card"></i> Identity Verification</div>

    <div class="input-field">
      <label>Patient Aadhaar Card</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-upload"></i>
        <input type="file" style="cursor: pointer;">
      </div>
      <div class="status-text">
        <i class="fa-solid fa-clock-rotate-left"></i> Verification Pending
      </div>
    </div>

    <button id="saveBtn" class="save-btn">
      <i class="fa-solid fa-floppy-disk"></i> Save & Update Profile
    </button>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let currentUser = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;

  try {
    const docRef = doc(db, "users", user.uid);
    const snap = await getDoc(docRef);
    if (snap.exists()) {
      const data = snap.data();
      document.getElementById("patientName").value = data.patientName || "";
      document.getElementById("age").value = data.age || "";
      document.getElementById("gender").value = data.gender || "Male";
      document.getElementById("bloodGroup").value = data.bloodGroup || "A+";
      document.getElementById("diseases").value = data.diseases || "";
      document.getElementById("allergies").value = data.allergies || "";
      document.getElementById("history").value = data.history || "";
      document.getElementById("medications").value = data.medications || "";
      document.getElementById("guardianName").value = data.guardianName || "";
      document.getElementById("guardianRelation").value = data.guardianRelation || "Son";
      document.getElementById("guardianPhone").value = data.guardianPhone || "";
      document.getElementById("guardianEmail").value = data.guardianEmail || "";
    }
  } catch (err) {
    console.error("Settings load error:", err);
  }
});

document.getElementById("saveBtn").addEventListener("click", async () => {
  if (!currentUser) return;

  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving Changes...';

  const updatedData = {
    patientName: document.getElementById("patientName").value,
    age: document.getElementById("age").value,
    gender: document.getElementById("gender").value,
    bloodGroup: document.getElementById("bloodGroup").value,
    diseases: document.getElementById("diseases").value,
    allergies: document.getElementById("allergies").value,
    history: document.getElementById("history").value,
    medications: document.getElementById("medications").value,
    guardianName: document.getElementById("guardianName").value,
    guardianRelation: document.getElementById("guardianRelation").value,
    guardianPhone: document.getElementById("guardianPhone").value,
    guardianEmail: document.getElementById("guardianEmail").value,
    updatedAt: new Date()
  };

  try {
    await setDoc(doc(db, "users", currentUser.uid), updatedData, { merge: true });
    alert("✅ Profile updated successfully!");
    window.location.href = "patient-dashboard.html";
  } catch (error) {
    console.error(error);
    alert("Error updating profile.");
    saveBtn.disabled = false;
    saveBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save & Update Profile';
  }
});
</script>

</body>
</html>

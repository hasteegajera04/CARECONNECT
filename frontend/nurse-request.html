<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareConnect | Incoming Requests</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary: #0a73ff;
  --primary-dark: #0056cc;
  --accent: #4ade80;
  --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0efff 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #1e293b;
  --text-muted: #64748b;
  --accept: #22c55e;
  --reject: #ef4444;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg-gradient);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

.header-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.5);
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon i { color: white; font-size: 18px; }
.logo span { font-weight: 700; font-size: 20px; color: var(--text-main); }

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}

.container {
  width: 100%;
  max-width: 900px;
  margin-top: 100px;
}

.page-title {
  margin-bottom: 30px;
}

.page-title h2 {
  font-size: 32px;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: -1px;
}

.page-title p {
  color: var(--text-muted);
  font-size: 16px;
}

.requests-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.request-card {
  background: var(--card-bg);
  padding: 30px;
  border-radius: 24px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s;
  animation: slideIn 0.5s ease-out forwards;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.request-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 25px 50px rgba(10, 115, 255, 0.1);
}

.patient-info {
  display: flex;
  align-items: center;
  gap: 20px;
}

.patient-avatar {
  width: 60px;
  height: 60px;
  background: #f1f5f9;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
  font-size: 24px;
}

.patient-details h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-main);
}

.patient-details p {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 2px;
}

.actions {
  display: flex;
  gap: 12px;
}

.btn {
  padding: 12px 20px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-view {
  background: #f1f5f9;
  color: var(--text-main);
}

.btn-view:hover {
  background: #e2e8f0;
}

.btn-accept {
  background: var(--accept);
  color: white;
  box-shadow: 0 8px 16px rgba(34, 197, 94, 0.2);
}

.btn-accept:hover {
  box-shadow: 0 12px 24px rgba(34, 197, 94, 0.3);
  transform: translateY(-2px);
}

.btn-reject {
  background: #fef2f2;
  color: var(--reject);
}

.btn-reject:hover {
  background: #fee2e2;
}

.empty-state {
  text-align: center;
  padding: 60px;
  background: var(--card-bg);
  border-radius: 30px;
  color: var(--text-muted);
}

.empty-state i {
  font-size: 48px;
  margin-bottom: 15px;
  opacity: 0.5;
}

</style>
</head>

<body>

<div class="header-nav">
  <div class="logo" onclick="location.href='nurse-dashboard.html'">
    <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    <span>CareConnect</span>
  </div>
  <a href="nurse-dashboard.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Dashboard
  </a>
</div>


<div class="container">
  <div class="page-title">
    <h2>Incoming Care Requests</h2>
    <p>Review and accept care requests from families in need.</p>
  </div>

  <div id="requestsContainer" class="requests-list">
    <!-- Dynamic Content -->
  </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  query,
  where,
  getDocs,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const auth = getAuth();
const container = document.getElementById("requestsContainer");

async function sendTelegramMessage(chatId, message) {
  const botToken = "8574674998:AAFHc_QfUwU-StFTsWbdxyHaf5ZxJ9Jm4rA";
  try {
    await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: chatId, text: message })
    });
  } catch (err) { console.error("Telegram Error:", err); }
}

onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  loadRequests(user.uid);
});

async function loadRequests(nurseUid) {
  container.innerHTML = "";

  const q = query(
    collection(db, "careRequests"),
    where("nurseId", "==", nurseUid),
    where("status", "==", "pending")
  );

  const snapshot = await getDocs(q);

  if (snapshot.empty) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-Inbox"></i>
        <h3>No Pending Requests</h3>
        <p>New requests will appear here when patients choose you.</p>
      </div>
    `;
    return;
  }

  for (const req of snapshot.docs) {
    const data = req.data();
    const userSnap = await getDoc(doc(db, "users", data.userId));
    if (!userSnap.exists()) continue;

    const patient = userSnap.data();

    const card = document.createElement("div");
    card.className = "request-card";

    card.innerHTML = `
      <div class="patient-info">
        <div class="patient-avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <div class="patient-details">
          <h3>${patient.patientName || "Patient"}</h3>
          <p>${patient.age || "N/A"} years old • ${patient.city || "Location N/A"}</p>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-view" onclick="viewPatient('${data.userId}')">
          <i class="fa-solid fa-eye"></i> Details
        </button>
        <button class="btn btn-accept" onclick="updateStatus('${req.id}','accepted','${patient.telegramChatId}')">
          <i class="fa-solid fa-check"></i> Accept
        </button>
        <button class="btn btn-reject" onclick="updateStatus('${req.id}','rejected','${patient.telegramChatId}')">
          <i class="fa-solid fa-xmark"></i> Reject
        </button>
      </div>
    `;

    container.appendChild(card);
  }
}

window.viewPatient = function(uid) {
  window.location.href = `patient-profile.html?uid=${uid}`;
};

window.updateStatus = async function(requestId, status, chatId) {
  try {
    const nurse = auth.currentUser;
    const nurseSnap = await getDoc(doc(db, "users", nurse.uid));
    const nurseName = nurseSnap.exists() ? nurseSnap.data().fullName : "Your Nurse";

    await updateDoc(doc(db, "careRequests", requestId), {
      status,
      updatedAt: new Date(),
      nurseName
    });

    if (chatId) {
      const msg = status === "accepted"
          ? `✅ CareConnect\nYour care request has been accepted by ${nurseName}.`
          : `❌ CareConnect\nYour care request has been rejected by ${nurseName}.`;
      await sendTelegramMessage(chatId, msg);
    }

    alert(`Request ${status} successfully.`);
    location.reload();
  } catch (err) {
    console.error(err);
    alert("Action failed. Please try again.");
  }
};
</script>

</body>
</html>
tml>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CareConnect | Profile Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary: #0a73ff;
  --primary-dark: #0056cc;
  --accent: #4ade80;
  --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0efff 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #1e293b;
  --text-muted: #64748b;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.header-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.5);
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon i { color: white; font-size: 18px; }
.logo span { font-weight: 700; font-size: 20px; color: var(--text-main); }

.profile-card {
  background: var(--card-bg);
  width: 100%;
  max-width: 850px;
  padding: 50px;
  border-radius: 30px;
  box-shadow: 0 30px 60px rgba(10, 115, 255, 0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  margin-top: 40px;
}

.brand-section {
  text-align: center;
  margin-bottom: 40px;
}

.brand-section h1 {
  font-size: 30px;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: -1px;
}

.brand-section p {
  color: var(--text-muted);
  margin-top: 5px;
  font-size: 15px;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-group label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-main);
  padding-left: 5px;
}

.input-wrapper {
  display: flex;
  align-items: center;
  background: #f8fafc;
  border: 2px solid transparent;
  border-radius: 16px;
  padding: 2px 18px;
  transition: all 0.3s ease;
}

.input-wrapper:focus-within {
  background: white;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(10, 115, 255, 0.1);
}

.input-wrapper i {
  color: var(--text-muted);
  font-size: 16px;
  margin-right: 12px;
}

.input-wrapper input,
.input-wrapper select,
.input-wrapper textarea {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  padding: 14px 0;
  font-size: 15px;
  font-weight: 500;
  color: var(--text-main);
}

.input-wrapper textarea {
  min-height: 100px;
  resize: none;
}

.file-input {
  padding: 10px 0;
}

.status-info {
  font-size: 12px;
  font-weight: 700;
  color: #f97316;
  margin-top: 5px;
  padding-left: 5px;
}

.btn-container {
  grid-column: 1 / -1;
  margin-top: 20px;
}

.save-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: 18px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 20px rgba(10, 115, 255, 0.2);
}

.save-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(10, 115, 255, 0.3);
}

.save-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

</style>
</head>

<body>

<div class="header-nav">
  <div class="logo" onclick="location.href='nurse-dashboard.html'">
    <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    <span>CareConnect</span>
  </div>
</div>


<div class="profile-card">
  <div class="brand-section">
    <h1>Professional Settings</h1>
    <p>Keep your profile updated to receive more care requests</p>
  </div>

  <div class="form-grid">
    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-user"></i>
        <input id="fullName" type="text" placeholder="e.g. Sarah Johnson">
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-envelope"></i>
        <input id="email" type="email" placeholder="nurse@email.com">
      </div>
    </div>

    <div class="form-group">
      <label>Mobile Number</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-phone"></i>
        <input id="phone" type="tel" placeholder="+91 XXXXX XXXXX">
      </div>
    </div>

    <div class="form-group">
      <label>City / Location</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-location-dot"></i>
        <input id="city" type="text" placeholder="Current City">
      </div>
    </div>

    <div class="form-group">
      <label>Specialization</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-stethoscope"></i>
        <select id="specialization">
          <option>Dementia Care</option>
          <option>Alzheimer’s Care</option>
          <option>Stroke Rehabilitation</option>
          <option>ICU / Critical Care</option>
          <option>Post Operative Care</option>
          <option>Palliative Care</option>
          <option>Elderly / Geriatric Care</option>
          <option>Paralysis Care</option>
          <option>Wound Dressing & Bed Sore Care</option>
          <option>Injection & Medication</option>
          <option>Mother & Baby Care</option>
          <option>Newborn Care</option>
          <option>Physiotherapy Assistance</option>
          <option>General Home Nursing</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Experience (Years)</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-award"></i>
        <input id="experience" type="number" placeholder="Number of years">
      </div>
    </div>

    <div class="form-group">
      <label>Availability</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-clock"></i>
        <select id="availability">
          <option>Full-Time</option>
          <option>Part-Time</option>
          <option>Night Shift</option>
          <option>24x7</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Cost (₹ / Day)</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-indian-rupee-sign"></i>
        <input id="cost" type="number" placeholder="Service fee per day">
      </div>
    </div>

    <div class="form-group">
      <label>Languages Spoken</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-language"></i>
        <input id="languages" type="text" placeholder="English, Hindi, etc.">
      </div>
    </div>

    <div class="form-group">
      <label>Aadhaar Verification</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-shield-halved"></i>
        <input type="file" class="file-input">
      </div>
      <div class="status-info">Verification: Pending Review</div>
    </div>

    <div class="form-group" style="grid-column: 1 / -1;">
      <label>About You / Professional Bio</label>
      <div class="input-wrapper">
        <textarea id="about" placeholder="Briefly describe your professional background and care philosophy..."></textarea>
      </div>
    </div>

    <div class="form-group">
      <label>Profile Photo</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-camera"></i>
        <input type="file" class="file-input">
      </div>
    </div>

    <div class="btn-container">
      <button id="saveNurseBtn" class="save-btn" type="button">Save Profile Settings</button>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let currentUser = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;

  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists()) {
    const d = snap.data();
    document.getElementById("fullName").value = d.fullName || "";
    document.getElementById("email").value = d.email || user.email;
    document.getElementById("phone").value = d.phone || "";
    document.getElementById("city").value = d.city || "";
    document.getElementById("specialization").value = d.specialization || "General Home Nursing";
    document.getElementById("experience").value = d.experience || "";
    document.getElementById("availability").value = d.availability || "Full-Time";
    document.getElementById("cost").value = d.cost || "";
    document.getElementById("languages").value = d.languages || "";
    document.getElementById("about").value = d.about || "";
  }
});

document.getElementById("saveNurseBtn").addEventListener("click", async () => {
  if (!currentUser) return;

  const saveBtn = document.getElementById("saveNurseBtn");
  saveBtn.disabled = true;
  saveBtn.textContent = "Saving Changes...";

  const nurseData = {
    role: "nurse",
    fullName: document.getElementById("fullName").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    city: document.getElementById("city").value,
    specialization: document.getElementById("specialization").value,
    experience: document.getElementById("experience").value,
    availability: document.getElementById("availability").value,
    cost: document.getElementById("cost").value,
    languages: document.getElementById("languages").value,
    about: document.getElementById("about").value,
    updatedAt: new Date()
  };

  try {
    await setDoc(doc(db, "users", currentUser.uid), nurseData, { merge: true });
    alert("Profile updated successfully!");
    window.location.href = "nurse-dashboard.html";
  } catch (err) {
    console.error(err);
    alert("Error saving profile");
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Profile Settings";
  }
});
</script>

</body>
</html>

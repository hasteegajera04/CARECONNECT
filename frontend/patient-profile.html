<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareConnect | Patient Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --primary: #0a73ff;
  --primary-dark: #0056cc;
  --accent: #4ade80;
  --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0efff 100%);
  --card-bg: rgba(255, 255, 255, 0.95);
  --text-main: #1e293b;
  --text-muted: #64748b;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}

.header-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.5);
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon i { color: white; font-size: 18px; }
.logo span { font-weight: 700; font-size: 20px; color: var(--text-main); }

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
}

.profile-card {
  background: var(--card-bg);
  width: 100%;
  max-width: 950px;
  padding: 50px;
  border-radius: 35px;
  box-shadow: 0 30px 60px rgba(10, 115, 255, 0.1);
  backdrop-filter: blur(10px);
  margin-top: 60px;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  text-align: center;
  margin-bottom: 45px;
}

.avatar-badge {
  width: 120px;
  height: 120px;
  background: #f1f5f9;
  border-radius: 30px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  color: var(--primary);
  box-shadow: 0 15px 30px rgba(0,0,0,0.05);
}

.card-header h1 {
  font-size: 34px;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: -1.5px;
}

.card-header p {
  color: var(--text-muted);
  font-size: 16px;
  margin-top: 5px;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
}

.section-label {
  grid-column: 1 / -1;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  margin-top: 25px;
  padding-bottom: 12px;
  border-bottom: 2px solid #f1f5f9;
  display: flex;
  align-items: center;
  gap: 10px;
}

.info-field label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-box {
  background: #f8fafc;
  padding: 16px 20px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  gap: 15px;
  border: 1px solid transparent;
  transition: 0.3s;
}

.data-box:hover {
  background: white;
  border-color: var(--primary);
  box-shadow: 0 10px 20px rgba(0,0,0,0.04);
}

.data-box i {
  color: var(--primary);
  font-size: 18px;
  width: 20px;
  text-align: center;
}

.data-box input, .data-box textarea {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-main);
}

.data-box textarea {
  min-height: 80px;
  resize: none;
  line-height: 1.6;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #fff7ed;
  color: #f97316;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="header-nav">
  <div class="logo" onclick="location.href='patient-dashboard.html'">
    <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    <span>CareConnect</span>
  </div>
  <a href="javascript:history.back()" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back
  </a>
</div>

<div class="profile-card">
  <div class="card-header">
    <div class="avatar-badge">✦</div>
    <h1 id="dispPatientName">Loading Profile...</h1>
    <p>Comprehensive Health Record</p>
  </div>

  <div class="info-grid">
    <div class="section-label"><i class="fa-solid fa-id-card"></i> Personal Information</div>

    <div class="info-field">
      <label>Full Name</label>
      <div class="data-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="patientName" readonly>
      </div>
    </div>

    <div class="info-field">
      <label>Age</label>
      <div class="data-box">
        <i class="fa-solid fa-cake-candles"></i>
        <input type="text" id="age" readonly>
      </div>
    </div>

    <div class="info-field">
      <label>Gender</label>
      <div class="data-box">
        <i class="fa-solid fa-venus-mars"></i>
        <input type="text" id="gender" readonly>
      </div>
    </div>

    <div class="info-field">
      <label>Blood Group</label>
      <div class="data-box">
        <i class="fa-solid fa-droplet"></i>
        <input type="text" id="bloodGroup" readonly>
      </div>
    </div>

    <div class="section-label"><i class="fa-solid fa-stethoscope"></i> Medical Background</div>

    <div class="info-field">
      <label>Existing Conditions</label>
      <div class="data-box">
        <i class="fa-solid fa-disease"></i>
        <input type="text" id="diseases" readonly>
      </div>
    </div>

    <div class="info-field">
      <label>Known Allergies</label>
      <div class="data-box">
        <i class="fa-solid fa-shield-virus"></i>
        <input type="text" id="allergies" readonly>
      </div>
    </div>

    <div class="info-field" style="grid-column: 1 / -1;">
      <label>Medical History Details</label>
      <div class="data-box">
        <i class="fa-solid fa-file-medical"></i>
        <textarea id="history" readonly></textarea>
      </div>
    </div>

    <div class="info-field" style="grid-column: 1 / -1;">
      <label>Current Medications</label>
      <div class="data-box">
        <i class="fa-solid fa-pills"></i>
        <textarea id="medications" readonly></textarea>
      </div>
    </div>

    <div class="section-label"><i class="fa-solid fa-user-shield"></i> Guardian Contact</div>

    <div class="info-field">
      <label>Guardian Name</label>
      <div class="data-box">
        <i class="fa-solid fa-user-nurse"></i>
        <input type="text" id="guardianName" readonly>
      </div>
    </div>

    <div class="info-field">
      <label>Relationship</label>
      <div class="data-box">
        <i class="fa-solid fa-link"></i>
        <input type="text" id="guardianRelation" readonly>
      </div>
    </div>

    <div class="info-field">
      <label>Mobile Number</label>
      <div class="data-box">
        <i class="fa-solid fa-phone"></i>
        <input type="text" id="guardianPhone" readonly>
      </div>
    </div>

    <div class="info-field">
      <label>Email Address</label>
      <div class="data-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="text" id="guardianEmail" readonly>
      </div>
    </div>

    <div class="section-label"><i class="fa-solid fa-shield-check"></i> Verification</div>

    <div class="info-field">
      <label>Identity Document</label>
      <div class="data-box">
        <i class="fa-solid fa-file-shield"></i>
        <input type="text" value="Aadhaar Card Uploaded" readonly>
      </div>
      <div class="status-badge">
        <i class="fa-solid fa-clock-rotate-left"></i> Verification Pending
      </div>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const uid = params.get("uid") || user.uid;

  try {
    const docRef = doc(db, "users", uid);
    const snap = await getDoc(docRef);

    if (snap.exists()) {
      const data = snap.data();
      document.getElementById("dispPatientName").innerText = data.patientName || "Patient Profile";
      document.getElementById("patientName").value = data.patientName || "N/A";
      document.getElementById("age").value = data.age ? data.age + " Years" : "N/A";
      document.getElementById("gender").value = data.gender || "N/A";
      document.getElementById("bloodGroup").value = data.bloodGroup || "N/A";
      document.getElementById("diseases").value = data.diseases || "None Reported";
      document.getElementById("allergies").value = data.allergies || "None Reported";
      document.getElementById("history").value = data.history || "No previous history recorded.";
      document.getElementById("medications").value = data.medications || "No current medications.";
      document.getElementById("guardianName").value = data.guardianName || "N/A";
      document.getElementById("guardianRelation").value = data.guardianRelation || "N/A";
      document.getElementById("guardianPhone").value = data.guardianPhone || "N/A";
      document.getElementById("guardianEmail").value = data.guardianEmail || "N/A";
    }
  } catch (err) {
    console.error("Profile load error:", err);
  }
});
</script>

</body>
</html>
